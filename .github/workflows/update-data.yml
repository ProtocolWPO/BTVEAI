name: Refresh market data

on:
  schedule:
    # Run every four hours at minute 47 (UTC).
    - cron: "47 */4 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: data-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Refresh CoinGecko markets
        run: node scripts/update-data.mjs
      - name: Commit refreshed snapshots
        run: |
          if git diff --quiet -- site/data; then
            echo "No data changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+ProtocolWPO@users.noreply.github.com"
          git add site/data/market.json
          git commit -m "Refresh market data"
          git push
